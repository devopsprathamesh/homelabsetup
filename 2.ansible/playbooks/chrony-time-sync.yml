---
# Fixes clock drift on VirtualBox lab VMs: after a host is paused, snapshotted,
# or the laptop sleeps, the guest clock can drift by hours or days. A rough
# correction (borrowed from the Ansible control node's own clock, see the
# first task below) gets each host close enough for apt/chrony to trust repo
# Release files, then chrony takes over. Ubuntu's default chrony config
# (`makestep 1.0 3`) only allows a hard step during the first 3 corrections
# after chronyd starts — after that it only slews slowly, so a multi-hour
# offset gets stuck "Not synchronised" until chrony is restarted. `makestep
# 1.0 -1` allows an immediate step at any time, so this self-heals without
# manual intervention (see docs/12-troubleshooting.md for the manual recovery
# steps this replaces).
- name: Keep clocks in sync on all lab VMs
  hosts: all
  become: true
  tasks:
    # Chicken-and-egg: if the clock has drifted enough, apt itself refuses to
    # trust repo Release files ("not valid yet"/"unknown reason"), so we can't
    # even apt-install chrony to fix the clock. This playbook only ever runs
    # from `server` (the control node, per ansible/README.md), whose clock is
    # already kept correct, so use *that* machine's own clock via Ansible's
    # `now()` — evaluated on the controller, not the managed host — instead
    # of an external HTTP/DNS lookup that some lab VMs can't reliably reach.
    - name: Step the system clock to match the Ansible control node's clock
      ansible.builtin.command: "date -u -s '{{ now(utc=true).strftime('%Y-%m-%d %H:%M:%S') }}'"
      changed_when: true

    - name: Install chrony
      ansible.builtin.apt:
        name: chrony
        state: present
        update_cache: true
      register: chrony_apt_install
      until: chrony_apt_install is succeeded
      retries: 10
      delay: 15

    - name: Allow chrony to step the clock on any large offset, not just the first 3
      ansible.builtin.lineinfile:
        path: /etc/chrony/chrony.conf
        regexp: '^makestep'
        line: 'makestep 1.0 -1'

    - name: Ensure chrony is enabled
      ansible.builtin.systemd:
        name: chrony
        enabled: true

    # Always restart rather than notify-on-change: a `start` on an already-running
    # chronyd (e.g. one that's been sitting stuck "Not synchronised" since a VM
    # resumed from a long pause) is a no-op, it does NOT force reselecting a
    # source. Only an actual restart reliably clears that stuck state, so this
    # has to run unconditionally on every play, not just when chrony.conf changes.
    - name: Restart chrony to force a clean source selection
      ansible.builtin.systemd:
        name: chrony
        state: restarted

    - name: Force an immediate resync
      ansible.builtin.command: chronyc makestep
      changed_when: true
