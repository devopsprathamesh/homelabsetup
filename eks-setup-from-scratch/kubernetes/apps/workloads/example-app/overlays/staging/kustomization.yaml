apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: example-app
resources:
  - ../../base
patches:
  - target:
      kind: Rollout
      name: example-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: VirtualService
      name: example-app
    patch: |-
      - op: replace
        path: /spec/hosts/0
        value: app-staging.example.com
