# DNS-01 via Route53 — required for a wildcard cert (HTTP-01 can't prove ownership of a
# wildcard). cert-manager's IAM permissions come from the Terraform platform-addons
# module's cert_manager_route53_hosted_zone_arns wiring (IRSA).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-route53
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: platform-team@example.com
    privateKeySecretRef:
      name: letsencrypt-route53-account-key
    solvers:
      - dns01:
          route53:
            region: us-east-1
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-example-com
  namespace: istio-ingress
spec:
  secretName: wildcard-example-com-tls
  issuerRef:
    name: letsencrypt-route53
    kind: ClusterIssuer
  dnsNames:
    - "*.example.com"
    - "example.com"
